<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucky Lotto - 멀티 추출기</title>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9890466279476766"
     crossorigin="anonymous"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
</head>
<body>

<div class="container">
    <button id="theme-toggle" class="theme-toggle" aria-label="Toggle Theme">🌙</button>
    <header>
        <h1>Lucky Lotto</h1>
        <p class="subtitle">행운의 번호 조합을 여러 개 만들어보세요.</p>
    </header>

    <div class="controls">
        <label for="game-count">추출할 게임 수:</label>
        <select id="game-count">
            <option value="1">1게임</option>
            <option value="2">2게임</option>
            <option value="3">3게임</option>
            <option value="4">4게임</option>
            <option value="5">5게임</option>
        </select>
    </div>

    <div id="result-container">
        <!-- 결과가 여기에 동적으로 생성됩니다 -->
    </div>

    <button id="generate-btn">번호 생성하기</button>

    <footer>
        <p>※ 본 프로그램은 무작위 번호 생성기이며 당첨을 보장하지 않습니다.</p>
    </footer>
</div>

<script src="main.js"></script>

</body>
</html>
