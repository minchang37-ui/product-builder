<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucky Lotto - 멀티 추출기</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            width: 100%;
            background: #fff;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            text-align: center;
        }

        header { margin-bottom: 25px; }
        h1 { color: #2c3e50; margin-bottom: 8px; font-size: 1.8rem; }
        .subtitle { color: #7f8c8d; font-size: 0.9rem; }

        /* 설정 영역 */
        .controls {
            margin-bottom: 25px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        select {
            padding: 8px 15px;
            border-radius: 8px;
            border: 1px solid #ddd;
            font-size: 1rem;
            outline: none;
        }

        /* 결과 리스트 영역 */
        #result-container {
            margin-bottom: 25px;
        }

        .lotto-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            padding: 15px 0;
            border-bottom: 1px dashed #eee;
            animation: fadeIn 0.5s ease-out forwards;
        }

        .lotto-row:last-child { border-bottom: none; }

        .game-label {
            font-size: 0.8rem;
            font-weight: bold;
            color: #999;
            margin-right: 10px;
            width: 50px;
            text-align: left;
        }

        /* 공 스타일 */
        .ball {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 0.9rem;
            box-shadow: inset 0 -3px 6px rgba(0,0,0,0.2);
        }

        .plus-sign { font-weight: bold; color: #ccc; margin: 0 2px; }

        /* 번호별 색상 */
        .range-1 { background-color: #fbc02d; }
        .range-11 { background-color: #1e88e5; }
        .range-21 { background-color: #e53935; }
        .range-31 { background-color: #757575; }
        .range-41 { background-color: #43a047; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #generate-btn {
            background-color: #2980b9;
            color: #fff;
            border: none;
            padding: 12px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
        }

        #generate-btn:hover { background-color: #3498db; }

        footer { margin-top: 20px; font-size: 0.75rem; color: #bbb; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Lucky Lotto</h1>
        <p class="subtitle">행운의 번호 조합을 여러 개 만들어보세요.</p>
    </header>

    <div class="controls">
        <label for="game-count">추출할 게임 수:</label>
        <select id="game-count">
            <option value="1">1게임</option>
            <option value="2">2게임</option>
            <option value="3">3게임</option>
            <option value="4">4게임</option>
            <option value="5">5게임</option>
        </select>
    </div>

    <div id="result-container">
        </div>

    <button id="generate-btn">번호 생성하기</button>

    <footer>
        <p>※ 본 프로그램은 무작위 번호 생성기이며 당첨을 보장하지 않습니다.</p>
    </footer>
</div>

<script>
    document.getElementById('generate-btn').addEventListener('click', function() {
        const count = document.getElementById('game-count').value;
        const container = document.getElementById('result-container');
        container.innerHTML = ''; // 초기화

        for (let i = 0; i < count; i++) {
            setTimeout(() => {
                const gameRow = createLottoRow(i + 1);
                container.appendChild(gameRow);
            }, i * 100); // 게임별로 살짝 시차를 두고 등장
        }
    });

    function createLottoRow(gameNum) {
        const row = document.createElement('div');
        row.className = 'lotto-row';

        const label = document.createElement('span');
        label.className = 'game-label';
        label.textContent = `Game ${gameNum}`;
        row.appendChild(label);

        const numbers = [];
        while (numbers.length < 7) {
            const num = Math.floor(Math.random() * 45) + 1;
            if (!numbers.includes(num)) numbers.push(num);
        }

        const mainNums = numbers.slice(0, 6).sort((a, b) => a - b);
        const bonusNum = numbers[6];

        // 메인 번호 추가
        mainNums.forEach(num => {
            row.appendChild(createBall(num));
        });

        // 플러스 기호
        const plus = document.createElement('span');
        plus.className = 'plus-sign';
        plus.textContent = '+';
        row.appendChild(plus);

        // 보너스 번호 추가
        row.appendChild(createBall(bonusNum));

        return row;
    }

    function createBall(num) {
        const ball = document.createElement('div');
        ball.className = 'ball';
        if (num <= 10) ball.classList.add('range-1');
        else if (num <= 20) ball.classList.add('range-11');
        else if (num <= 30) ball.classList.add('range-21');
        else if (num <= 40) ball.classList.add('range-31');
        else ball.classList.add('range-41');
        ball.textContent = num;
        return ball;
    }
</script>

</body>
</html>
